name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: GHOSTENV_NO_HELPER=1 go test ./...

      - name: Build Swift helper (macOS)
        run: |
          swiftc -O -o ghostenv-keychain internal/keychain/helper/main.swift \
            -framework Security -framework LocalAuthentication

      - uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
