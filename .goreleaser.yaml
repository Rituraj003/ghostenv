version: 2

builds:
  - id: ghostenv
    main: ./cmd/ghostenv
    binary: ghostenv
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "ghostenv_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip
    files:
      - src: ghostenv-keychain
        dst: .
        strip_parent: true
        info:
          mode: 0755

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: Rituraj003
      name: homebrew-tap
    name: ghostenv
    homepage: "https://github.com/Rituraj003/ghostenv"
    description: "Keep secrets away from AI agents"
    install: |
      bin.install "ghostenv"
      bin.install "ghostenv-keychain" if File.exist? "ghostenv-keychain"
